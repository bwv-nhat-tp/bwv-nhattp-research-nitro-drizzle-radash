services:
  api:
    build:
      context: .
      dockerfile: ./infra/api/Dockerfile.api
    container_name: api
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8081
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-intern_app}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      AWS_REGION: ${AWS_REGION:-ap-northeast-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      CLOUDFRONT_URL: ${CLOUDFRONT_URL}
    ports:
      - "8081:8081"
    restart: always
    depends_on:
      - postgres

  front:
    build:
      context: .
      dockerfile: ./infra/front/Dockerfile.front
    container_name: front
    ports:
      - "${APP_PORT:-8080}:80"
    restart: always

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-intern_app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
